# Footnotes profile for staging/validated and study/footnotes cleanup
name: footnotes
description: >
  Profile for footnote structural cleanup across the Orthodox Phronema Archive.
  Extends the staging profile with F1-F4 footnote-specific pattern detection:
  fused subsection headers, dangling continuation ranges, broken wikilinks,
  and unresolved source alias normalization.

line_format: plain

# No verse anchors — process every non-blank line
anchor_regex: null

# Protected zones — never modify these
protected_zones:
  - '^---\s*$'         # YAML frontmatter
  - '^#{1,4}\s'        # Markdown headers
  - '^\*\(anchor:'     # Anchor reference lines
  - '^\*\(after '      # Article placement markers

# Biblical names allowlist (same as canon)
allowlist: schemas/biblical_names.txt

# Fused prefixes — same as canon (OSB cross-reference markers)
fused_prefixes: ["a", "b", "c", "d"]

# Footnote structural checks to enable
footnote_checks:
  - F1   # Fused subsection header (content fused with chapter-range)
  - F2   # Dangling continuation range (wikilink-N without proper bracket)
  - F3   # Broken wikilink (unmatched [[ or ]])
  - F4   # Unresolved source alias (vs. reference_aliases.yaml)

# Path to reference aliases for F4 checking
reference_aliases_path: schemas/reference_aliases.yaml

# Prepositions for P4 detection
prepositions:
  - "of"
  - "in"
  - "to"
  - "for"
  - "with"
  - "from"
  - "on"
  - "by"
  - "at"
  - "as"
  - "into"
  - "upon"
  - "over"
  - "under"
  - "after"
  - "before"
  - "between"
  - "through"
  - "about"
  - "against"
  - "among"
  - "within"
  - "without"
  - "toward"
  - "towards"
  - "unto"

# Conjunctions for P8 detection
conjunctions:
  - "and"
  - "but"
  - "or"
  - "nor"
  - "for"
  - "yet"
  - "so"
  - "that"
  - "then"
  - "when"
  - "while"
  - "although"
  - "because"
  - "since"
  - "until"
  - "unless"
  - "therefore"
  - "moreover"
  - "nevertheless"
  - "however"

# Context-sensitive fusions
context_patterns:
  - pattern: '\balong time\b'
    replacement: 'a long time'
  - pattern: '\bafar country\b'
    replacement: 'a far country'

