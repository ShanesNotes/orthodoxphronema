# Patristic profile for Church Fathers and theological prose
name: patristic
description: >
  Profile for patristic writings (Church Fathers, theological treatises,
  catechetical lectures, homilies, etc.). These texts typically feature:
  - Longer prose paragraphs rather than verse-per-line
  - Greek and Latin theological terminology
  - Extensive footnoting with superscript markers
  - Archaic English from older translations
  - Section/paragraph numbering rather than chapter:verse

line_format: plain

# No anchors — process every non-blank line
anchor_regex: null

# Protected zones
protected_zones:
  - '^---\s*$'       # YAML frontmatter
  - '^#{1,4}\s'      # Markdown headers
  - '^\*\*\*'        # Horizontal rules
  - '^\[fn\d+\]'     # Footnote references

# Theological terms allowlist (create as needed)
allowlist: schemas/patristic_terms.txt

# Fused prefixes — a and b are common in footnoted patristic editions
fused_prefixes: ["a", "b"]

# Standard prepositions (P4)
prepositions:
  - "of"
  - "in"
  - "to"
  - "for"
  - "with"
  - "from"
  - "on"
  - "by"
  - "at"
  - "as"
  - "into"
  - "upon"
  - "over"
  - "under"
  - "after"
  - "before"
  - "between"
  - "through"
  - "about"
  - "against"
  - "among"
  - "within"
  - "without"
  - "toward"
  - "towards"
  - "unto"
  - "concerning"

# Standard conjunctions (P8)
conjunctions:
  - "and"
  - "but"
  - "or"
  - "nor"
  - "for"
  - "yet"
  - "so"
  - "that"
  - "then"
  - "when"
  - "while"
  - "although"
  - "because"
  - "since"
  - "until"
  - "unless"
  - "whereas"
  - "therefore"
  - "moreover"
  - "furthermore"
  - "nevertheless"
  - "however"

# Context-sensitive fusions common in patristic extraction
context_patterns:
  - pattern: '\balong time\b'
    replacement: 'a long time'
  - pattern: '\bafar off\b'
    replacement: null  # "afar off" is correct in patristic English — do NOT change
  - pattern: '\bafar country\b'
    replacement: 'a far country'

