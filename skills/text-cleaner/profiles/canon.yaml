# Canon profile for Orthodox Phronema biblical scripture (OSB/Septuagint)
name: canon
description: >
  Biblical scripture profile for the Orthodox Study Bible and Septuagint texts.
  Uses anchor format BOOK.CH:VS for verse lines, includes YAML frontmatter,
  and references biblical names allowlist.

line_format: anchor

# Verse anchor format: BOOK.CH:VS text
anchor_regex: '^([A-Z0-9]+\.\d+:\d+)\s+(.*)'

# Protected zones to never modify
protected_zones:
  - '^---\s*$'
  - '^#{1,4}\s'

# Biblical names allowlist
allowlist: schemas/biblical_names.txt

# Fused prefixes from OSB cross-reference markers (a, b, c, d)
fused_prefixes: ["a", "b", "c", "d"]

# Standard prepositions (P4 detection)
prepositions:
  - "of"
  - "in"
  - "to"
  - "for"
  - "with"
  - "from"
  - "on"
