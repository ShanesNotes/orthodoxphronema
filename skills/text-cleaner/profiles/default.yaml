# Default profile for generic extracted text (no specific format assumed)
name: default
description: >
  Generic profile for any extracted text. Assumes plain text (every line),
  no specific anchor format, and standard English aspell dictionary.

line_format: plain

# No specific anchor format for plain text
anchor_regex: ''

# Protected zones to never modify
protected_zones:
  - '^---\s*$'       # YAML frontmatter markers
  - '^#{1,4}\s'      # Markdown headers
  - '^\s*$'          # Blank lines

# No allowlist by default
allowlist: null

# Common extraction artifact: fused 'a' prefix (most frequent)
fused_prefixes: ["a"]

# Standard prepositions (P4 detection)
prepositions:
  - "of"
  - "in"
  - "to"
  - "for"
  - "with"
  - "from"
  - "on"
  - "by"
  - "at"
  - "as"
  - "into"
  - "upon"
  - "over"
  - "under"
  - "after"
  - "before"
  - "between"
  - "through"
  - "about"
  - "against"
  - "among"
  - "within"
  - "without"
  - "toward"
  - "towards"
  - "around"
  - "beyond"
  - "during"
  - "until"
  - "behind"
  - "beside"
  - "beneath"
  - "above"
  - "across"
  - "along"

# Standard conjunctions (P8 detection)
conjunctions:
  - "and"
  - "but"
  - "or"
  - "nor"
  - "for"
  - "yet"
  - "so"
  - "that"
  - "when"
  - "while"
  - "where"
  - "which"
  - "because"
  - "although"
  - "though"
  - "since"
  - "unless"
  - "whether"
  - "if"
  - "then"
  - "than"

# Minimal false positive list for generic text
false_positives:
  - a
  - all
  - always
  - analyze
  - and
  - anniversary
  - anybody
  - anything
  - anytime
  - anywhere
