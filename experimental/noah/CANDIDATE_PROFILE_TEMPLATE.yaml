profile_id: candidate-v1
track: A
evaluation_profile: grounded_reflection_v1
prompt_template:
  sections:
    - Literal scene
    - Patterns
    - Tension or surprise
    - Interior response
    - Question / prayer
  instructions:
    - Stay visibly grounded in the source packet.
    - Use archive-native anchors when citing scripture.
    - Do not import outside commentary.
scoring:
  hard_gates:
    require_valid_anchor_syntax: true
    require_all_sections: true
    reject_external_sources: true
    minimum_grounding_score: 0.70
  weights:
    anchor_coverage: 0.30
    lexical_grounding: 0.35
    section_completeness: 0.20
    bounded_novelty: 0.15
  track_b_extensions:
    cross_anchor_density: 0.20
    ancillary_link_precision: 0.15
    graph_usage_density: 0.15
evaluator_toggles:
  score_anchor_coverage: true
  score_lexical_grounding: true
  score_section_completeness: true
  score_bounded_novelty: true
  score_graph_usage_density: false
